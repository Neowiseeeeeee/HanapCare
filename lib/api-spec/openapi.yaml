openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: HanapCare Hospital Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: dashboard
  - name: patients
  - name: appointments
  - name: doctors
  - name: departments
  - name: consultations
  - name: lab
  - name: pharmacy
  - name: billing
  - name: wards
  - name: staff
  - name: notifications
  - name: audit

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── AUTH ───────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  # ─── DASHBOARD ──────────────────────────────────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Overall dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Recent system activity
      responses:
        "200":
          description: Recent activity list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/bed-occupancy:
    get:
      operationId: getBedOccupancy
      tags: [dashboard]
      summary: Bed occupancy summary by ward
      responses:
        "200":
          description: Bed occupancy
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WardOccupancy"

  /dashboard/revenue-trend:
    get:
      operationId: getRevenueTrend
      tags: [dashboard]
      summary: Monthly revenue trend
      responses:
        "200":
          description: Revenue trend
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RevenueTrendPoint"

  /dashboard/appointment-stats:
    get:
      operationId: getAppointmentStats
      tags: [dashboard]
      summary: Today's appointment counts by status
      responses:
        "200":
          description: Appointment stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentStats"

  /dashboard/top-diagnoses:
    get:
      operationId: getTopDiagnoses
      tags: [dashboard]
      summary: Top diagnoses this month
      responses:
        "200":
          description: Top diagnoses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DiagnosisCount"

  /dashboard/inventory-alerts:
    get:
      operationId: getInventoryAlerts
      tags: [dashboard]
      summary: Low stock and expiring medicine alerts
      responses:
        "200":
          description: Inventory alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryAlert"

  # ─── PATIENTS ───────────────────────────────────────────────
  /patients:
    get:
      operationId: listPatients
      tags: [patients]
      summary: List all patients
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Patient list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientListResponse"
    post:
      operationId: createPatient
      tags: [patients]
      summary: Register a new patient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientInput"
      responses:
        "201":
          description: Patient created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"

  /patients/{id}:
    get:
      operationId: getPatient
      tags: [patients]
      summary: Get patient by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
    patch:
      operationId: updatePatient
      tags: [patients]
      summary: Update patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientUpdate"
      responses:
        "200":
          description: Updated patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
    delete:
      operationId: deletePatient
      tags: [patients]
      summary: Delete patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /patients/{id}/visits:
    get:
      operationId: getPatientVisits
      tags: [patients]
      summary: Get visit history for a patient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Visit history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PatientVisit"

  # ─── APPOINTMENTS ────────────────────────────────────────────
  /appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      summary: List appointments
      parameters:
        - name: date
          in: query
          schema:
            type: string
        - name: doctorId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Appointment list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentListResponse"
    post:
      operationId: createAppointment
      tags: [appointments]
      summary: Schedule an appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentInput"
      responses:
        "201":
          description: Appointment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /appointments/{id}:
    get:
      operationId: getAppointment
      tags: [appointments]
      summary: Get appointment by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
    patch:
      operationId: updateAppointment
      tags: [appointments]
      summary: Update appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentUpdate"
      responses:
        "200":
          description: Updated appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /appointments/today:
    get:
      operationId: getTodayAppointments
      tags: [appointments]
      summary: Get today's appointments
      responses:
        "200":
          description: Today's appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"

  # ─── DOCTORS ────────────────────────────────────────────────
  /doctors:
    get:
      operationId: listDoctors
      tags: [doctors]
      summary: List all doctors
      parameters:
        - name: departmentId
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Doctor list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Doctor"
    post:
      operationId: createDoctor
      tags: [doctors]
      summary: Add a doctor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DoctorInput"
      responses:
        "201":
          description: Doctor created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Doctor"

  /doctors/{id}:
    get:
      operationId: getDoctor
      tags: [doctors]
      summary: Get doctor by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Doctor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Doctor"
    patch:
      operationId: updateDoctor
      tags: [doctors]
      summary: Update doctor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DoctorUpdate"
      responses:
        "200":
          description: Updated doctor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Doctor"

  # ─── DEPARTMENTS ─────────────────────────────────────────────
  /departments:
    get:
      operationId: listDepartments
      tags: [departments]
      summary: List departments
      responses:
        "200":
          description: Departments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"
    post:
      operationId: createDepartment
      tags: [departments]
      summary: Create department
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepartmentInput"
      responses:
        "201":
          description: Department created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"

  # ─── CONSULTATIONS / EHR ─────────────────────────────────────
  /consultations:
    get:
      operationId: listConsultations
      tags: [consultations]
      summary: List consultations
      parameters:
        - name: patientId
          in: query
          schema:
            type: integer
        - name: doctorId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Consultations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Consultation"
    post:
      operationId: createConsultation
      tags: [consultations]
      summary: Create consultation / SOAP note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsultationInput"
      responses:
        "201":
          description: Consultation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Consultation"

  /consultations/{id}:
    get:
      operationId: getConsultation
      tags: [consultations]
      summary: Get consultation by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Consultation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Consultation"
    patch:
      operationId: updateConsultation
      tags: [consultations]
      summary: Update consultation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsultationUpdate"
      responses:
        "200":
          description: Updated consultation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Consultation"

  /vital-signs:
    get:
      operationId: listVitalSigns
      tags: [consultations]
      summary: List vital signs for a patient
      parameters:
        - name: patientId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Vital signs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VitalSign"
    post:
      operationId: createVitalSign
      tags: [consultations]
      summary: Record vital signs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VitalSignInput"
      responses:
        "201":
          description: Vital signs recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VitalSign"

  /prescriptions:
    get:
      operationId: listPrescriptions
      tags: [consultations]
      summary: List prescriptions
      parameters:
        - name: patientId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Prescriptions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Prescription"
    post:
      operationId: createPrescription
      tags: [consultations]
      summary: Create a prescription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrescriptionInput"
      responses:
        "201":
          description: Prescription created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prescription"

  # ─── LABORATORY ──────────────────────────────────────────────
  /lab-requests:
    get:
      operationId: listLabRequests
      tags: [lab]
      summary: List lab requests
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: patientId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Lab requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LabRequest"
    post:
      operationId: createLabRequest
      tags: [lab]
      summary: Create lab request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LabRequestInput"
      responses:
        "201":
          description: Lab request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LabRequest"

  /lab-requests/{id}:
    get:
      operationId: getLabRequest
      tags: [lab]
      summary: Get lab request by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lab request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LabRequest"
    patch:
      operationId: updateLabRequest
      tags: [lab]
      summary: Update lab request / add result
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LabRequestUpdate"
      responses:
        "200":
          description: Updated lab request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LabRequest"

  # ─── PHARMACY ────────────────────────────────────────────────
  /medicines:
    get:
      operationId: listMedicines
      tags: [pharmacy]
      summary: List medicines
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: lowStock
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Medicine list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Medicine"
    post:
      operationId: createMedicine
      tags: [pharmacy]
      summary: Add medicine to inventory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MedicineInput"
      responses:
        "201":
          description: Medicine added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Medicine"

  /medicines/{id}:
    get:
      operationId: getMedicine
      tags: [pharmacy]
      summary: Get medicine by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Medicine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Medicine"
    patch:
      operationId: updateMedicine
      tags: [pharmacy]
      summary: Update medicine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MedicineUpdate"
      responses:
        "200":
          description: Updated medicine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Medicine"

  /dispensing-records:
    get:
      operationId: listDispensingRecords
      tags: [pharmacy]
      summary: List dispensing records
      parameters:
        - name: patientId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Dispensing records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DispensingRecord"
    post:
      operationId: createDispensingRecord
      tags: [pharmacy]
      summary: Record medicine dispensing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DispensingRecordInput"
      responses:
        "201":
          description: Dispensing recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DispensingRecord"

  # ─── BILLING ─────────────────────────────────────────────────
  /billings:
    get:
      operationId: listBillings
      tags: [billing]
      summary: List billing records
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: patientId
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Billing list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingListResponse"
    post:
      operationId: createBilling
      tags: [billing]
      summary: Create billing record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillingInput"
      responses:
        "201":
          description: Billing created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Billing"

  /billings/{id}:
    get:
      operationId: getBilling
      tags: [billing]
      summary: Get billing by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Billing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Billing"
    patch:
      operationId: updateBilling
      tags: [billing]
      summary: Update billing status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BillingUpdate"
      responses:
        "200":
          description: Updated billing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Billing"

  /payments:
    get:
      operationId: listPayments
      tags: [billing]
      summary: List payments
      parameters:
        - name: billingId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
    post:
      operationId: createPayment
      tags: [billing]
      summary: Record a payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "201":
          description: Payment recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  # ─── WARDS & BEDS ────────────────────────────────────────────
  /wards:
    get:
      operationId: listWards
      tags: [wards]
      summary: List wards
      responses:
        "200":
          description: Ward list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ward"
    post:
      operationId: createWard
      tags: [wards]
      summary: Create ward
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WardInput"
      responses:
        "201":
          description: Ward created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ward"

  /beds:
    get:
      operationId: listBeds
      tags: [wards]
      summary: List beds
      parameters:
        - name: wardId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Bed list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bed"
    post:
      operationId: createBed
      tags: [wards]
      summary: Create bed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BedInput"
      responses:
        "201":
          description: Bed created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bed"

  /beds/{id}:
    patch:
      operationId: updateBed
      tags: [wards]
      summary: Update bed status or assignment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BedUpdate"
      responses:
        "200":
          description: Updated bed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bed"

  # ─── STAFF ───────────────────────────────────────────────────
  /staff:
    get:
      operationId: listStaff
      tags: [staff]
      summary: List staff members
      parameters:
        - name: role
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Staff list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffMember"
    post:
      operationId: createStaff
      tags: [staff]
      summary: Add staff member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffInput"
      responses:
        "201":
          description: Staff created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"

  /staff/{id}:
    get:
      operationId: getStaffMember
      tags: [staff]
      summary: Get staff member by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Staff member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"
    patch:
      operationId: updateStaff
      tags: [staff]
      summary: Update staff member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffUpdate"
      responses:
        "200":
          description: Updated staff member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"

