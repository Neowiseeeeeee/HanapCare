services:
  - type: web
    name: hanapcare
    runtime: node
    plan: free
    region: singapore
    buildCommand: >
      npx --yes pnpm@10.26.1 install --frozen-lockfile &&
      BASE_PATH=/ PORT=3000 npx --yes pnpm@10.26.1 --filter @workspace/hanapcare run build &&
      npx --yes pnpm@10.26.1 --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        value: noreply@hanapcare.ph
      - key: BREVO_SENDER_NAME
        value: HanapCare
