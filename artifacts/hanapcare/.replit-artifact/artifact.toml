kind = "web"
previewPath = "/"
title = "HanapCare - Hospital Management System"
version = "1.0.0"
id = "artifacts/hanapcare"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20780

[services.development]
run = "pnpm --filter @workspace/hanapcare run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hanapcare", "run", "build" ]
publicDir = "artifacts/hanapcare/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20780"
BASE_PATH = "/"
